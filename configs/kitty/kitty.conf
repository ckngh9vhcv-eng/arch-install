font_family      FiraCode Nerd Font
font_size        12
scrollback_lines 10000
enable_audio_bell false
window_padding_width 4
confirm_os_window_close 0
background_opacity 0.85

# Void Command color scheme
background  #06060C
foreground  #E0D4F0
cursor      #8B6FC0
cursor_text_color #06060C
selection_background #2A1F3D
selection_foreground #E0D4F0
url_color   #8B6FC0

# Tab bar
tab_bar_style powerline
active_tab_background #8B6FC0
active_tab_foreground #06060C
inactive_tab_background #10101E
inactive_tab_foreground #B8A0D6

# ANSI colors (purple-tinted dark palette)
color0  #06060C
color8  #2A1F3D
color1  #CC4444
color9  #E06666
color2  #44AA77
color10 #66CC99
color3  #CCAA44
color11 #EEBB66
color4  #6688CC
color12 #88AAEE
color5  #8B6FC0
color13 #B8A0D6
color6  #44AAAA
color14 #66CCCC
color7  #B8A0D6
color15 #E0D4F0
