command_timeout = 5000

format = """[](#1E1529)\
$python\
$username\
[](bg:#2D2040 fg:#1E1529)\
$directory\
[](fg:#2D2040 bg:#3D2B5A)\
$git_branch\
$git_status\
[](fg:#3D2B5A bg:#7C5CBF)\
$c\
$golang\
$nodejs\
$rust\
$nix_shell\
[](fg:#7C5CBF bg:#503D6B)\
$docker_context\
[](fg:#503D6B bg:#3B2D50)\
$cmd_duration\
$time\
[ ](fg:#3B2D50)"""

[username]
show_always = true
style_user = "bg:#1E1529 fg:#B8A0D6"
style_root = "bg:#1E1529 fg:#FF6B6B"
format = "[ $user ]($style)"

[directory]
style = "bg:#2D2040 fg:#D4C4E9"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
Documents = "󰈙 "
Downloads = " "
Music = " "
Pictures = " "

[git_branch]
symbol = ""
style = "bg:#3D2B5A fg:#D4C4E9"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#3D2B5A fg:#D4C4E9"
format = "[$all_status$ahead_behind ]($style)"

[c]
symbol = " "
style = "bg:#7C5CBF fg:#1E1529"
format = "[ $symbol($version) ]($style)"

[golang]
symbol = " "
style = "bg:#7C5CBF fg:#1E1529"
format = "[ $symbol($version) ]($style)"

[nodejs]
symbol = ""
style = "bg:#7C5CBF fg:#1E1529"
format = "[ $symbol ($version) ]($style)"

[rust]
symbol = ""
style = "bg:#7C5CBF fg:#1E1529"
format = "[ $symbol ($version) ]($style)"

[nix_shell]
symbol = "❄"
style = "bg:#7C5CBF fg:#1E1529"
format = "[ $symbol $state ]($style)"

[python]
style = "bg:#1E1529 fg:#B8A0D6"
format = "[($virtualenv )]($style)"

[docker_context]
symbol = " "
style = "bg:#503D6B fg:#D4C4E9"
format = "[ $symbol $context ]($style)"

[cmd_duration]
min_time = 2000
style = "bg:#3B2D50 fg:#B8A0D6"
format = "[ 祥$duration ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#3B2D50 fg:#B8A0D6"
format = "[ $time ]($style)"
