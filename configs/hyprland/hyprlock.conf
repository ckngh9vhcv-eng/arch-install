background {
    monitor =
    path = /home/mike/wallpapers/tokyo-night-6.png
    blur_passes = 4
    blur_size = 5
    brightness = 0.85
    contrast = 0.95
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H:%M)"
    font_size = 80
    font_family = FiraCode Nerd Font
    color = rgba(192, 202, 245, 1.0)
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    font_size = 18
    font_family = FiraCode Nerd Font
    color = rgba(169, 177, 214, 1.0)
    position = 0, 130
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(187, 154, 247, 0.6)
    inner_color = rgba(31, 35, 53, 0.85)
    font_color = rgba(192, 202, 245, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(187, 154, 247, 1.0)
    fail_color = rgba(204, 34, 34, 0.8)
    fail_text = <i>Authentication failed</i>
    position = 0, -20
    halign = center
    valign = center
}
