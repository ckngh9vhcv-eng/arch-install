# Hyprland Configuration
# Ported from NixOS configuration

# ===== Zoom helper scripts =====
# Place these in ~/.local/bin/ (user-setup.sh handles this)
# hypr-zoom-in, hypr-zoom-out, hypr-zoom-reset

# ===== Monitor =====
# Auto-detect resolution and refresh rate; works on any display
# To override for a specific monitor, uncomment and adjust:
# monitor = DP-1, 2560x1440@144, 0x0, 1
monitor = , preferred, auto, 1

# ===== Autostart =====
exec-once = quickshell
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = wl-paste --watch cliphist -max-items 2000 -db-path ~/.local/share/cliphist/db store
exec-once = lxqt-policykit-agent
exec-once = hypridle

# ===== Environment =====
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORMTHEME,qt6ct

# ===== General =====
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(8B6FC0)
    col.inactive_border = rgb(10101E)
    layout = dwindle
    resize_on_border = true
    gaps_workspaces = 50
}

# ===== Decoration =====
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 12
        passes = 3
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a2eee)
    }

    dim_inactive = true
    dim_strength = 0.05
}

# ===== Animations =====
animations {
    enabled = true

    # Smooth deceleration — windows glide into place
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    # Snappy with slight overshoot — feels alive
    bezier = overshoot, 0.05, 0.7, 0.1, 1.12
    # Gentle ease-out for fading
    bezier = fade, 0.0, 0.0, 0.15, 1.0
    # Quick and crisp for workspace switches
    bezier = crisp, 0.22, 1.0, 0.36, 1.0

    # Window open — slide in with slight overshoot
    animation = windows, 1, 5, overshoot, popin 80%
    # Window close — fast fade out + shrink
    animation = windowsOut, 1, 4, fade, popin 80%
    # Window move/resize — smooth and responsive
    animation = windowsMove, 1, 4, smooth, slide
    # Fade for layer surfaces and opacity changes
    animation = fade, 1, 4, fade
    # Dim transitions when switching focus
    animation = fadeDim, 1, 5, fade
    # Workspace switches — crisp horizontal slide with visible gap
    animation = workspaces, 1, 4, crisp, slide
    # Special workspace (scratchpad) — drop down from top
    animation = specialWorkspace, 1, 5, overshoot, slidevert
    # Border color transitions on focus change
    animation = border, 1, 8, smooth
}

# ===== Dwindle Layout =====
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ===== Input =====
input {
    follow_mouse = 1
    sensitivity = 0
    numlock_by_default = true
    repeat_rate = 50
    repeat_delay = 300
}

# ===== Cursor =====
cursor {
    zoom_factor = 1.0
    zoom_rigid = false
    hide_on_key_press = true
}

# ===== Misc =====
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    vfr = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ===== XWayland =====
xwayland {
    force_zero_scaling = true
}

# ===== Layer Rules =====
# Blur for Quickshell surfaces (sidebar, bar, notifications)
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.3 on, match:namespace quickshell
layerrule = xray off, match:namespace quickshell

# ===== Window Rules =====
# Opacity rules
windowrule = opacity 0.80 0.70, match:class ^(kitty)$
windowrule = opacity 0.80 0.70, match:class ^(thunar)$
windowrule = opacity 0.88 0.78, match:class ^(code-url-handler)$
windowrule = opacity 0.88 0.78, match:class ^(Code)$
windowrule = opacity 0.87 0.77, match:class ^(obsidian)$
windowrule = opacity 0.80 0.70, match:class ^(nm-connection-editor)$
windowrule = opacity 0.80 0.70, match:class ^(blueman-manager)$

# Steam client — float dialogs, keep main window tiled
windowrule = float on, match:class ^(steam)$, match:title ^(Friends List)$
windowrule = float on, match:class ^(steam)$, match:title ^(Steam Settings)$
windowrule = float on, match:class ^(steam)$, match:title ^()$

# Steam games — performance optimizations
windowrule = no_blur on, match:class ^(steam_app_.*)$
windowrule = no_shadow on, match:class ^(steam_app_.*)$
windowrule = no_anim on, match:class ^(steam_app_.*)$
windowrule = fullscreen on, match:class ^(steam_app_.*)$
windowrule = idle_inhibit on, match:class ^(steam_app_.*)$

# Gamescope
windowrule = fullscreen on, match:class ^(gamescope)$
windowrule = no_blur on, match:class ^(gamescope)$
windowrule = no_anim on, match:class ^(gamescope)$
windowrule = idle_inhibit on, match:class ^(gamescope)$

# Picture-in-Picture
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$
windowrule = move 73% 72%, match:title ^(Picture-in-Picture)$

# File dialogs — auto-float + center
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(Open Folder)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(File Upload)$
windowrule = float on, match:title ^(Select)$
windowrule = center on, match:title ^(Open File)$
windowrule = center on, match:title ^(Save File)$
windowrule = center on, match:title ^(Open Folder)$
windowrule = center on, match:title ^(Save As)$
windowrule = center on, match:title ^(File Upload)$

# Common float apps
windowrule = float on, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$
windowrule = size 50% 50%, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = center on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(gnome-calculator)$

# ===== Keybindings =====
# App launchers
bind = SUPER, Space, exec, qs ipc call shell toggleLauncher
bind = SUPER, B, exec, brave
bind = SUPER, T, exec, kitty
bind = SUPER, F, exec, thunar

# Lock screen
bind = SUPER, L, exec, hyprlock

# Window management
bind = SUPER, Q, killactive,
bind = SUPER, W, togglefloating,
bind = SUPER, P, fullscreen, 1
bind = SUPER SHIFT, P, fullscreen, 0

# Move focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move window
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Scratchpad
bind = SUPER, grave, togglespecialworkspace, magic
bind = SUPER SHIFT, grave, movetoworkspace, special:magic

# Scroll through workspaces
bind = SUPER, mouse_down, workspace, e-1
bind = SUPER, mouse_up, workspace, e+1

# Screenshot — mode selector via Quickshell
bind = SUPER SHIFT, S, exec, qs ipc call shell toggleScreenshot

# Screenshot — full screen to clipboard with notification
bind = SUPER, Print, exec, ~/.local/bin/screenshot-full

# Clipboard history via Quickshell
bind = SUPER, V, exec, qs ipc call shell toggleClipboard

# Quickshell sidebar
bind = SUPER, D, exec, qs ipc call shell toggleSidebar

# Game mode toggle
bind = SUPER, G, exec, qs ipc call shell toggleGameMode

# Screen recording toggle
bind = SUPER, R, exec, qs ipc call shell toggleRecording

# Cycle wallpaper
bind = SUPER, N, exec, qs ipc call shell cycleWallpaper

# Zoom reset
bind = SUPER, 0, exec, ~/.local/bin/hypr-zoom-reset

# ===== Media keys =====
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# ===== Volume keys =====
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.0 && qs ipc call shell showVolumeOsd
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && qs ipc call shell showVolumeOsd
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && qs ipc call shell showVolumeOsd

# ===== Brightness keys =====
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && qs ipc call shell showBrightnessOsd
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && qs ipc call shell showBrightnessOsd

# ===== Zoom (Super + / Super -) =====
binde = SUPER, equal, exec, ~/.local/bin/hypr-zoom-in
binde = SUPER, minus, exec, ~/.local/bin/hypr-zoom-out

# ===== Mouse bindings =====
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
