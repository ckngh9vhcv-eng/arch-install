# Hyprland Configuration
# Ported from NixOS — ~/nixos-config/home/mike-hyprland.nix

# ===== Zoom helper scripts =====
# Place these in ~/.local/bin/ (post-install.sh handles this)
# hypr-zoom-in, hypr-zoom-out, hypr-zoom-reset

# ===== Monitor =====
monitor = ,2560x1440@94.89,auto,1

# ===== Autostart =====
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = wl-paste --watch cliphist store
exec-once = lxqt-policykit-agent

# ===== Environment =====
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORMTHEME,qt6ct

# ===== General =====
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(7C5CBF)
    col.inactive_border = rgb(1E1529)
    layout = dwindle
}

# ===== Decoration =====
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 12
        passes = 3
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a2eee)
    }

    dim_inactive = true
    dim_strength = 0.15
}

# ===== Animations =====
animations {
    enabled = true

    # Smooth deceleration — windows glide into place
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    # Snappy with slight overshoot — feels alive
    bezier = overshoot, 0.05, 0.7, 0.1, 1.12
    # Gentle ease-out for fading
    bezier = fade, 0.0, 0.0, 0.15, 1.0
    # Quick and crisp for workspace switches
    bezier = crisp, 0.22, 1.0, 0.36, 1.0

    # Window open — slide in with slight overshoot
    animation = windows, 1, 5, overshoot, popin 80%
    # Window close — fast fade out + shrink
    animation = windowsOut, 1, 4, fade, popin 80%
    # Window move/resize — smooth and responsive
    animation = windowsMove, 1, 4, smooth, slide
    # Fade for layer surfaces and opacity changes
    animation = fade, 1, 4, fade
    # Dim transitions when switching focus
    animation = fadeDim, 1, 5, fade
    # Workspace switches — crisp horizontal slide
    animation = workspaces, 1, 4, crisp, slide
    # Special workspace (scratchpad) — drop down from top
    animation = specialWorkspace, 1, 5, overshoot, slidevert
    # Border color transitions on focus change
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 40, smooth, loop
}

# ===== Dwindle Layout =====
dwindle {
    pseudotile = true
    preserve_split = true
}

# ===== Input =====
input {
    follow_mouse = 1
    sensitivity = 0
}

# ===== Cursor =====
cursor {
    zoom_factor = 1.0
    zoom_rigid = false
}

# ===== Misc =====
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ===== XWayland =====
xwayland {
    force_zero_scaling = true
}

# ===== Window Rules =====
# Opacity rules (matching KDE setup)
windowrule = opacity 0.80 0.70, class:^(kitty)$
windowrule = opacity 0.80 0.70, class:^(thunar)$
windowrule = opacity 0.85 0.75, class:^(systemsettings)$
windowrule = opacity 0.85 0.75, class:^(org.kde.kate)$
windowrule = opacity 0.75 0.65, class:^(org.kde.konsole)$
windowrule = opacity 0.88 0.78, class:^(code-url-handler)$
windowrule = opacity 0.88 0.78, class:^(Code)$
windowrule = opacity 0.87 0.77, class:^(obsidian)$

# Steam client — float dialogs, keep main window tiled
windowrule = float, class:^(steam)$, title:^(Friends List)$
windowrule = float, class:^(steam)$, title:^(Steam Settings)$
windowrule = float, class:^(steam)$, title:^()$

# Steam games — performance optimizations
windowrule = noblur, class:^(steam_app_.*)$
windowrule = noshadow, class:^(steam_app_.*)$
windowrule = noanim, class:^(steam_app_.*)$
windowrule = fullscreen, class:^(steam_app_.*)$
windowrule = idleinhibit always, class:^(steam_app_.*)$

# Gamescope
windowrule = fullscreen, class:^(gamescope)$
windowrule = noblur, class:^(gamescope)$
windowrule = noanim, class:^(gamescope)$
windowrule = idleinhibit always, class:^(gamescope)$

# ===== Keybindings =====
# App launchers
bind = SUPER, Space, exec, wofi --show drun
bind = SUPER, B, exec, brave
bind = SUPER, T, exec, kitty
bind = SUPER, F, exec, thunar

# Lock screen
bind = SUPER, L, exec, hyprlock

# Window management
bind = SUPER, Q, killactive,
bind = SUPER, V, togglefloating,
bind = SUPER, P, fullscreen, 1
bind = SUPER SHIFT, P, fullscreen, 0

# Move focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move window
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = SUPER, mouse_down, workspace, e-1
bind = SUPER, mouse_up, workspace, e+1

# Screenshot — region to clipboard
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Clipboard history
bind = SUPER, C, exec, cliphist list | wofi --show dmenu -p 'Clipboard' | cliphist decode | wl-copy

# Zoom reset
bind = SUPER, 0, exec, ~/.local/bin/hypr-zoom-reset

# ===== Media keys =====
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# ===== Zoom (Super+Ctrl+scroll) =====
binde = SUPER CTRL, mouse_up, exec, ~/.local/bin/hypr-zoom-out
binde = SUPER CTRL, mouse_down, exec, ~/.local/bin/hypr-zoom-in

# ===== Mouse bindings =====
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
